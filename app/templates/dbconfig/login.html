<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DB Config · Argos</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="dbconfig-body">
  <main class="dbconfig-main">
    <div class="dbconfig-card">
      <h2>🔒 DB Config</h2>
      <p class="dbconfig-subtitle">Accesso riservato all'amministratore della configurazione database.</p>
      {% if error %}
      <p class="login-error">{{ error }}</p>
      {% endif %}
      <form method="post" action="/dbconfig/login" class="login-form">
        <label>
          Utente
          <input type="text" name="username" required autofocus autocomplete="off" spellcheck="false">
        </label>
        <label>
          Password
          <input type="password" name="password" required autocomplete="off">
        </label>
        <button type="submit">Accedi</button>
      </form>
      <p class="dbconfig-hint">
        <small>
          Questa pagina è separata dal login normale dell'app. Le credenziali
          sono diverse da quelle del super-admin.
        </small>
      </p>
    </div>
  </main>
</body>
</html>
