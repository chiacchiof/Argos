{# Fragment HTMX: lista di asset matching la search. Inserito in
   #asset-search-results dentro il modal "Aggiungi contatto". #}
{% if items %}
<div style="margin-top:0.3rem;border:1px solid #ddd;border-radius:4px;max-height:240px;overflow-y:auto;background:white">
  {% for it in items %}
  <button type="button"
          onclick="importFromAsset({{ it.id }})"
          style="display:block;width:100%;text-align:left;padding:0.45rem 0.6rem;border:none;border-bottom:1px solid #f5f5f5;background:transparent;cursor:pointer;font-size:0.9rem"
          onmouseover="this.style.background='#f0f7ff'"
          onmouseout="this.style.background='transparent'">
    <div style="display:flex;justify-content:space-between;gap:0.5rem;align-items:baseline">
      <strong style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{ it.title or '(senza titolo)' }}</strong>
      <span style="display:inline-block;background:#e3f2fd;color:#1565c0;padding:0.1rem 0.4rem;border-radius:3px;font-size:0.75rem;white-space:nowrap"><code>{{ it.asset_type }}</code></span>
    </div>
    <small style="color:#888">#{{ it.id }}{% if it.source_url %} · {{ it.source_url[:60] }}{% if it.source_url|length > 60 %}…{% endif %}{% endif %}{% if it.status %} · {{ it.status }}{% endif %}</small>
  </button>
  {% endfor %}
</div>
{% else %}
<p class="muted small" style="margin:0.3rem 0">Nessun asset matching <code>{{ q }}</code>.</p>
{% endif %}
